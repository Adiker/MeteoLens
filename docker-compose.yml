services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      METEOLENS_FRONTEND_ORIGIN: http://localhost:5173
      METEOLENS_DATABASE_URL: sqlite:////data/meteolens.sqlite3
      METEOLENS_CACHE_DIR: /data/cache
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

