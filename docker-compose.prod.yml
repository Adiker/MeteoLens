services:
  data-init:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    user: "0:0"
    command: ["true"]
    environment:
      METEOLENS_GEOMETRY_DIR: /data/geometry
    volumes:
      - meteolens-data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    security_opt:
      - no-new-privileges:true
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    env_file:
      - .env.production
    environment:
      METEOLENS_ENV: production
      METEOLENS_DATABASE_URL: sqlite:////data/meteolens.sqlite3
      METEOLENS_CACHE_DIR: /data/cache
      METEOLENS_GEOMETRY_DIR: /data/geometry
      METEOLENS_SYNC_ON_STARTUP: "${METEOLENS_SYNC_ON_STARTUP:-true}"
      METEOLENS_REFRESH_ENABLED: "${METEOLENS_REFRESH_ENABLED:-true}"
    volumes:
      - meteolens-data:/data
    depends_on:
      data-init:
        condition: service_completed_successfully
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "${PUBLIC_HTTP_PORT:-8080}:8080"

volumes:
  meteolens-data:
