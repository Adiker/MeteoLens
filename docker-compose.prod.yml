services:
  data-init:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    user: "0:0"
    command: ["true"]
    environment:
      METEOLENS_GEOMETRY_DIR: /data/geometry
    volumes:
      - meteolens-data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    security_opt:
      - no-new-privileges:true
    restart: "no"
    cpus: "${DATA_INIT_CPUS:-0.5}"
    mem_limit: "${DATA_INIT_MEMORY:-512m}"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    env_file:
      - .env.production
    environment:
      METEOLENS_ENV: production
      METEOLENS_DATABASE_URL: sqlite:////data/meteolens.sqlite3
      METEOLENS_CACHE_DIR: /data/cache
      METEOLENS_GEOMETRY_DIR: /data/geometry
      METEOLENS_LOG_FORMAT: json
      METEOLENS_METRICS_ENABLED: "true"
      METEOLENS_SYNC_ON_STARTUP: "${METEOLENS_SYNC_ON_STARTUP:-true}"
      METEOLENS_REFRESH_ENABLED: "${METEOLENS_REFRESH_ENABLED:-true}"
    volumes:
      - meteolens-data:/data
    depends_on:
      data-init:
        condition: service_completed_successfully
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    cpus: "${BACKEND_CPUS:-2.0}"
    mem_limit: "${BACKEND_MEMORY:-2g}"
    logging:
      driver: json-file
      options:
        max-size: "${CONTAINER_LOG_MAX_SIZE:-10m}"
        max-file: "${CONTAINER_LOG_MAX_FILES:-5}"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=2).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    cpus: "${FRONTEND_CPUS:-0.5}"
    mem_limit: "${FRONTEND_MEMORY:-256m}"
    logging:
      driver: json-file
      options:
        max-size: "${CONTAINER_LOG_MAX_SIZE:-10m}"
        max-file: "${CONTAINER_LOG_MAX_FILES:-5}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "${PUBLIC_HTTP_PORT:-8080}:8080"

  prometheus:
    image: prom/prometheus@sha256:f39df5334dee301b885f77e0ff1159f5d8a43bf9db518f885544594799a1e3c2
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=2GB"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - meteolens-prometheus:/prometheus
    depends_on:
      backend:
        condition: service_healthy
      prometheus-init:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    cpus: "${PROMETHEUS_CPUS:-0.5}"
    mem_limit: "${PROMETHEUS_MEMORY:-512m}"
    logging:
      driver: json-file
      options:
        max-size: "${CONTAINER_LOG_MAX_SIZE:-10m}"
        max-file: "${CONTAINER_LOG_MAX_FILES:-5}"
    ports:
      - "127.0.0.1:${PROMETHEUS_HTTP_PORT:-9090}:9090"

  prometheus-init:
    image: alpine@sha256:48b0309ca019d89d40f670aa1bc06e426dc0931948452e8491e3d65087abc07d
    profiles: ["observability"]
    user: "0:0"
    entrypoint: ["chown", "-R", "65532:65532", "/prometheus"]
    volumes:
      - meteolens-prometheus:/prometheus
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    security_opt:
      - no-new-privileges:true
    network_mode: none
    restart: "no"
    cpus: "${PROMETHEUS_INIT_CPUS:-0.25}"
    mem_limit: "${PROMETHEUS_INIT_MEMORY:-128m}"

  data-ops:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    profiles: ["ops"]
    entrypoint: ["python", "-m", "app.operations.backup"]
    command: ["--help"]
    env_file:
      - .env.production
    environment:
      METEOLENS_DATABASE_URL: sqlite:////data/meteolens.sqlite3
      METEOLENS_CACHE_DIR: /data/cache
      METEOLENS_GEOMETRY_DIR: /data/geometry
    volumes:
      - meteolens-data:/data
      - ${METEOLENS_BACKUP_DIR:-./backups}:/backups
    # Restore must initialize an empty Docker-managed volume, which is root-owned
    # before the backend's non-root user ever starts. This manual, networkless
    # service keeps only the filesystem capabilities required for that job.
    user: "0:0"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    network_mode: none
    restart: "no"
    cpus: "${DATA_OPS_CPUS:-1.0}"
    mem_limit: "${DATA_OPS_MEMORY:-1g}"

volumes:
  meteolens-data:
  meteolens-prometheus:
