worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $request_method $uri $status $body_bytes_sent';
    access_log /dev/stdout main;

    sendfile on;
    keepalive_timeout 30s;
    server_tokens off;

    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;
    fastcgi_temp_path /tmp/fastcgi;
    uwsgi_temp_path /tmp/uwsgi;
    scgi_temp_path /tmp/scgi;

    # Per-IP limits protect public data routes and the much more expensive
    # product render/download route. Values are deliberately conservative.
    limit_req_zone $binary_remote_addr zone=public_api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=product_render:10m rate=10r/m;

    include /etc/nginx/conf.d/*.conf;
}
